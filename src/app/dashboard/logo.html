<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>QuoteMaster Logo 下载器</title>
</head>
<body style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f8fafc; font-family: sans-serif;">
  
  <h2 style="color: #1e293b; margin-bottom: 20px;">QuoteMaster 官方高清 Logo 生成器</h2>
  
  <button onclick="downloadPNG()" style="padding: 16px 32px; font-size: 18px; font-weight: bold; background: #2563eb; color: white; border: none; border-radius: 12px; cursor: pointer; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3); transition: transform 0.1s;" onmousedown="this.style.transform='scale(0.95)'" onmouseup="this.style.transform='scale(1)'">
    👇 一键下载高清 PNG 格式
  </button>

  <canvas id="canvas" width="1024" height="1024" style="display:none;"></canvas>

  <script>
  function downloadPNG() {
    const svgData = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="1024" height="1024"><defs><linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#3b82f6; stop-opacity:1" /><stop offset="100%" style="stop-color:#1d4ed8; stop-opacity:1" /></linearGradient><filter id="glow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#bfdbfe" flood-opacity="0.8"/></filter></defs><rect x="50" y="50" width="300" height="300" rx="72" fill="url(#blueGradient)" filter="url(#glow)"/><text x="200" y="278" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="900" font-size="200" fill="#ffffff" text-anchor="middle" letter-spacing="-5">Q</text></svg>`;
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const img = new Image();
    const svg = new Blob([svgData], {type: "image/svg+xml;charset=utf-8"});
    const url = URL.createObjectURL(svg);
    
    img.onload = function() {
      ctx.drawImage(img, 0, 0);
      const pngUrl = canvas.toDataURL("image/png");
      const a = document.createElement("a");
      a.download = "QuoteMaster_Logo_Official.png";
      a.href = pngUrl;
      a.click();
      URL.revokeObjectURL(url);
    };
    img.src = url;
  }
  </script>
</body>
</html>
